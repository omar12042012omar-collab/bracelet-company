<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracelet Order Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.form-box{
    background:white;
    padding:30px;
    border-radius:20px;
    width:320px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="form-box">
<h1>Bracelet Order</h1>

<form action="https://formsubmit.co/omar12042012omar@gmail.com" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="text" name="colors" placeholder="Colors Wanted" required>

<textarea name="details" placeholder="Extra Details"></textarea>

<input type="hidden" name="_captcha" value="false">

<button type="submit">Send Order</button>

</form>
</div>

</body>
</html>
